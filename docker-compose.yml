services:

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    environment:
      - CLUSTER_NAME=nyc-taxi
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_replication=1
      - HDFS_CONF_dfs_permissions_enabled=false
      - HDFS_CONF_dfs_namenode_http___address=0.0.0.0:9870
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - namenode_data:/hadoop/dfs/name
    networks:
      - hadoop-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9870 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    hostname: datanode
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_replication=1
      - HDFS_CONF_dfs_permissions_enabled=false
    ports:
      - "9864:9864"
    volumes:
      - datanode_data:/hadoop/dfs/data
    networks:
      - hadoop-net
    depends_on:
      namenode:
        condition: service_healthy

  spark:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: spark
    environment:
      - HDFS_NAMENODE=namenode
    volumes:
      - ./src:/app/src
      - ./notebooks:/app/notebooks
      - ./data:/app/data
    ports:
      - "8888:8888"
      - "4040:4040"
    networks:
      - hadoop-net
    depends_on:
      namenode:
        condition: service_healthy

volumes:
  namenode_data:
  datanode_data:

networks:
  hadoop-net:
    driver: bridge
